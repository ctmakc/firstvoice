services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: firstvoice
      POSTGRES_USER: fv
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme-in-production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fv -d firstvoice"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - firstvoice

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - firstvoice

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-firstvoice}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - firstvoice

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://fv:${POSTGRES_PASSWORD:-changeme}@postgres:5432/firstvoice
      SYNC_DATABASE_URL: postgresql://fv:${POSTGRES_PASSWORD:-changeme}@postgres:5432/firstvoice
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-firstvoice}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-changeme}
      MINIO_BUCKET: firstvoice-media
      MINIO_SECURE: "false"
      NEXTAUTH_URL: https://${DOMAIN:-localhost}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-in-production-32-char-secret}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      WHISPER_MODEL: base
      PROVENANCE_CONTRACT_ADDRESS: ${PROVENANCE_CONTRACT_ADDRESS:-}
      POLYGON_RPC: ${POLYGON_RPC:-https://rpc-amoy.polygon.technology}
      RELAYER_PRIVATE_KEY: ${RELAYER_PRIVATE_KEY:-}
      APP_SECRET: ${APP_SECRET:-firstvoice-production-secret}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - firstvoice

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://${DOMAIN:-localhost}/api
    environment:
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-in-production-32-char-secret}
      NEXTAUTH_URL: https://${DOMAIN:-localhost}
      NEXT_PUBLIC_API_URL: https://${DOMAIN:-localhost}/api
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - firstvoice

  worker:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    command: celery -A src.celery_app worker --loglevel=info --concurrency=2
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+asyncpg://fv:${POSTGRES_PASSWORD:-changeme}@postgres:5432/firstvoice
      SYNC_DATABASE_URL: postgresql://fv:${POSTGRES_PASSWORD:-changeme}@postgres:5432/firstvoice
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-firstvoice}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-changeme}
      MINIO_BUCKET: firstvoice-media
      MINIO_SECURE: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - firstvoice

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - web
    restart: unless-stopped
    networks:
      - firstvoice

volumes:
  postgres_data:
  minio_data:
  caddy_data:
  caddy_config:

networks:
  firstvoice:
    driver: bridge
